workspaces:
  - name: test-ws
    default: true
    path: /tmp/test-ws
    clone_command_template: "git clone --branch {{.Branch}} https://github.com/example/{{.RepoName}} {{.DestDir}}"
    projects:
      - name: test-project
        branch: main
        repositories:
          - name: repo-a
          - name: repo-b
          - name: repo-c
            branch: dev
          - name: repo-a
            local_dir_name: repo-a-copy
