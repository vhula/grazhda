workspaces:
  - name: default
    default: true
    path: /tmp/ws-default
    clone_command_template: "git clone --branch {{.Branch}} https://github.com/org/{{.RepoName}} {{.DestDir}}"
    projects:
      - name: backend
        branch: main
        repositories:
          - name: api
          - name: auth
            branch: dev
          - name: api
            local_dir_name: api-copy
  - name: secondary
    path: /tmp/ws-secondary
    clone_command_template: "git clone https://github.com/org/{{.RepoName}} {{.DestDir}}"
    projects:
      - name: frontend
        branch: main
        repositories:
          - name: webapp
          - name: mobile
