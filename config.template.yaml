# Grazhda Configuration
# This file is auto-generated during installation
# Modify as needed for your environment

# Dukh Web Server Configuration
dukh:
  host: localhost
  port: 50501

# Zgard Configuration
zgard:
  config: {}

general:
  install_dir: ${GRAZHDA_DIR}
  sources_dir: ${GRAZHDA_DIR}/sources
  bin_dir: ${GRAZHDA_DIR}/bin

workspaces:
  - name: default
    default: true
    path: /home/jake/ws
    clone_command_template: git clone --branch {{.Branch}} https://github.com/grazhda/{{.RepoName}} {{.DestDir}}
    projects:
      - name: ws-project1
        branch: main
        repositories:
          - name: test-repo-1
          - name: test-repo-2
          - name: test-repo-1
            local_dir_name: test-repo-1-copy
          - name: test-repo-3
            branch: dev
      - name: ws-project2
        branch: main
        repositories:
          - name: test-repo-1
          - name: test-repo-2
          - name: test-repo-3
  - name: secondary
    path: /home/jake/secondary_ws
    clone_command_template: git clone --branch {{.Branch}} https://github.com/grazhda/{{.RepoName}} {{.DestDir}}
    projects:
      - name: secondary-project1
        branch: main
        repositories:
          - name: test-repo-1
          - name: test-repo-2
