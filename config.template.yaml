# Grazhda Configuration
# This file is auto-generated during installation
# Modify as needed for your environment

# Editor used by `grazhda config --edit`.
# Resolved in order: this field → $VISUAL → $EDITOR → vi
editor: vim

packages:
  - name: sdkman
    version: latest
  - name: jdk
    version: 17.0.8-tem

# Dukh gRPC Server Configuration
dukh:
  host: localhost
  port: 50501
  autostart: true
  monitoring:
    period_mins: 5

# Zgard Configuration
zgard:
  config: {}

general:
  install_dir: ${GRAZHDA_DIR}
  sources_dir: ${GRAZHDA_DIR}/sources
  bin_dir: ${GRAZHDA_DIR}/bin

workspaces:
  - name: default
    path: ~/ws
    default: true
    clone_command_template: git clone --branch {{.Branch}} https://github.com/grazhda/{{.RepoName}} {{.DestDir}}
    # structure controls how repository names containing "/" are mapped to local
    # directories inside each project folder.
    #   tree (default) — preserves full path:  org/pack/repo → <project>/org/pack/repo
    #   list           — uses last URL segment: org/pack/repo → <project>/repo
    #                    (.git suffix is stripped; use local_dir_name to resolve conflicts)
    structure: tree
    projects:
      - name: ws-project1
        branch: main
        tags: [backend, api]          # project-level tags inherited by all repos below
        repositories:
          - name: test-repo-1
            tags: [core]              # repo-specific tags (merged with project tags)
          - name: test-repo-2
          - name: test-repo-1
            local_dir_name: test-repo-1-copy
          - name: test-repo-3
            branch: dev
            tags: [experimental]
      - name: ws-project2
        branch: main
        tags: [frontend]
        repositories:
          - name: test-repo-1
          - name: test-repo-2
            tags: [ui, critical]
          - name: test-repo-3
  - name: secondary
    path: ~/secondary_ws
    clone_command_template: git clone --branch {{.Branch}} https://github.com/grazhda/{{.RepoName}} {{.DestDir}}
    structure: tree
    projects:
      - name: secondary-project1
        branch: main
        tags: [infra]
        repositories:
          - name: test-repo-1
          - name: test-repo-2
            tags: [deploy]
