registry:
  - name: sdkman
    pre_create_dir: false
    pre_install: |
      export SDKMAN_DIR="$GRAZHDA_DIR/pkgs/sdkman"
    install: |
      curl -s "https://get.sdkman.io" | bash
    post_install: |
      [[ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ]] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
  - name: jdk
    version: 17.0.8-tem
    pre_create_dir: false
    depends_on:
      - sdkman
    install: |
      sdk install java 17.0.8-tem
