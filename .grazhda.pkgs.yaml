registry:
  - name: sdkman
    pre_create_dir: false
    pre_install_env: |
      export SDKMAN_DIR="$GRAZHDA_DIR/pkgs/sdkman"
    install: |
      curl -s "https://get.sdkman.io" | bash
    post_install_env: |
      [[ -s "$SDKMAN_DIR/bin/sdkman-init.sh" ]] && source "$SDKMAN_DIR/bin/sdkman-init.sh"
    purge: |
      rm -rf "$GRAZHDA_DIR/pkgs/sdkman"
  - name: jdk
    version: 17.0.8-tem
    pre_create_dir: false
    depends_on:
      - sdkman
    install: |
      sdk install java 17.0.8-tem
    purge: |
      sdk uninstall java 17.0.8-tem || true
  - name: maven
    version: 3.9.4
    pre_create_dir: false
    depends_on:
      - sdkman
      - jdk
    install: |
      sdk install maven 3.9.4
    purge: |
      sdk uninstall maven 3.9.4 || true