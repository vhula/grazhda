syntax = "proto3";

package workspace;

option go_package = "github.com/vhula/grazhda/internal/proto";

service WorkspaceService {
  rpc InitWorkspaces (InitWorkspacesRequest) returns (InitWorkspacesResponse);
  rpc PurgeWorkspaces (PurgeWorkspacesRequest) returns (PurgeWorkspacesResponse);
  rpc GetWorkspaces (GetWorkspacesRequest) returns (GetWorkspacesResponse);
}

message InitWorkspacesRequest {
}

message InitWorkspacesResponse {
  repeated string statuses = 1;
}

message PurgeWorkspacesRequest {
}

message PurgeWorkspacesResponse {
  repeated string statuses = 1;
}

message GetWorkspacesRequest {
  repeated string ids = 1;
}

message GetWorkspacesResponse {
  repeated Workspace workspaces = 1;
}

message Workspace {
  string id = 1;
  string name = 2;
  string created_at = 3;
  string absolute_path = 4;
}
