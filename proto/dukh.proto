syntax = "proto3";

package workspace;

option go_package = "github.com/vhula/grazhda/internal/proto";

service DukhService {
  rpc StopDukh (StopDukhRequest) returns (StopDukhResponse);
  rpc StatusDukh (StatusDukhRequest) returns (StatusDukhResponse);
}

message StopDukhRequest {
}

message StopDukhResponse {
  string status = 1;
}

message StatusDukhRequest {
}

message StatusDukhResponse {
  bool running = 1;
  int32 pid = 2;
  string status = 3;
}

