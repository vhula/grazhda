syntax = "proto3";

package dukh.v1;

option go_package = "github.com/vhula/grazhda/dukh/proto;dukhpb";

// DukhService exposes workspace health monitoring and server lifecycle control.
service DukhService {
  // Stop requests a graceful shutdown of the dukh server.
  rpc Stop(StopRequest) returns (StopResponse);

  // Status returns the current health snapshot of all monitored workspaces.
  rpc Status(StatusRequest) returns (StatusResponse);

  // Scan triggers an immediate out-of-cycle workspace rescan.
  rpc Scan(ScanRequest) returns (ScanResponse);
}

message StopRequest {}

message StopResponse {
  string message = 1;

  reserved 2 to 15;
}

message ScanRequest {}

message ScanResponse {
  // message describes what was triggered, e.g. "rescan initiated".
  string message = 1;

  reserved 2 to 15;
}

// StatusRequest optionally scopes the response to a single workspace.
// An empty workspace_name returns all workspaces.
// When rescan is true the server performs a synchronous workspace rescan
// before building the response, so the data is never stale.
message StatusRequest {
  string workspace_name = 1;
  bool   rescan         = 2;

  reserved 3 to 15;
}

message StatusResponse {
  repeated WorkspaceStatus workspaces = 1;
  string server_version                = 2;
  int64  uptime_seconds                = 3;

  reserved 4 to 15;
}

// WorkspaceStatus aggregates project health for one workspace.
message WorkspaceStatus {
  string                 name     = 1;
  string                 path     = 2;
  repeated ProjectStatus projects = 3;

  reserved 4 to 15;
}

// ProjectStatus aggregates repository health for one project.
message ProjectStatus {
  string              name         = 1;
  repeated RepoStatus repositories = 2;

  reserved 3 to 15;
}

// RepoStatus describes the health of a single repository.
message RepoStatus {
  string name              = 1;
  string path              = 2;
  string configured_branch = 3;
  string actual_branch     = 4;
  bool   exists            = 5;
  bool   branch_aligned    = 6;

  reserved 7 to 15;
}
